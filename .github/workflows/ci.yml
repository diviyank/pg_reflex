name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: "Clippy"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
      - name: Cache pgrx
        uses: actions/cache@v4
        with:
          path: ~/.pgrx/
          key: pgrx-clippy-pg17-${{ hashFiles('Cargo.lock') }}
          restore-keys: pgrx-clippy-pg17-
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpq-dev libreadline-dev zlib1g-dev
      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version '=0.18.0' --locked
      - name: Initialize pgrx
        run: cargo pgrx init --pg17 download
      - name: Run clippy
        run: cargo clippy --features pg17 -- -D warnings

  test:
    strategy:
      fail-fast: false
      matrix:
        pg: [15, 16, 17, 18]
    name: "PostgreSQL ${{ matrix.pg }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Cache pgrx
        uses: actions/cache@v4
        with:
          path: ~/.pgrx/
          key: pgrx-pg${{ matrix.pg }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: pgrx-pg${{ matrix.pg }}-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpq-dev libreadline-dev zlib1g-dev

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version '=0.18.0' --locked

      - name: Initialize pgrx
        run: cargo pgrx init --pg${{ matrix.pg }} download

      - name: Run tests
        run: cargo pgrx test pg${{ matrix.pg }}

  concurrent-test:
    name: "Concurrent tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true

      - name: Cache pgrx
        uses: actions/cache@v4
        with:
          path: ~/.pgrx/
          key: pgrx-pg17-${{ hashFiles('Cargo.lock') }}
          restore-keys: pgrx-pg17-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpq-dev libreadline-dev zlib1g-dev

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version '=0.18.0' --locked

      - name: Initialize pgrx
        run: cargo pgrx init --pg17 download

      - name: Install extension
        run: |
          PG_CONFIG=$(find ~/.pgrx -path "*/17.*/pgrx-install/bin/pg_config" -print -quit)
          cargo pgrx install --pg-config "$PG_CONFIG"

      - name: Start PostgreSQL
        run: |
          PGRX_BIN=$(find ~/.pgrx -path "*/17.*/pgrx-install/bin/pg_ctl" -print -quit | xargs dirname)
          PGRX_DIR=$(dirname $(dirname "$PGRX_BIN"))
          DATADIR="${PGRX_DIR}/data-17"
          if [ ! -d "$DATADIR" ]; then
            ${PGRX_BIN}/initdb -D "$DATADIR" --no-locale --encoding=UTF8
          fi
          ${PGRX_BIN}/pg_ctl -D "$DATADIR" -l /tmp/pg-concurrent.log -o "-p 28817" start

      - name: Create test database
        run: |
          PGRX_BIN=$(find ~/.pgrx -path "*/17.*/pgrx-install/bin/psql" -print -quit | xargs dirname)
          ${PGRX_BIN}/createdb -h localhost -p 28817 bench_db 2>/dev/null || true
          ${PGRX_BIN}/psql -h localhost -p 28817 -d bench_db -c "CREATE EXTENSION IF NOT EXISTS pg_reflex"

      - name: Run concurrent tests
        run: PG_VERSION=17 ./tests/test_concurrent.sh

      - name: Stop PostgreSQL
        if: always()
        run: |
          PGRX_BIN=$(find ~/.pgrx -path "*/17.*/pgrx-install/bin/pg_ctl" -print -quit | xargs dirname)
          PGRX_DIR=$(dirname $(dirname "$PGRX_BIN"))
          ${PGRX_BIN}/pg_ctl -D ${PGRX_DIR}/data-17 stop 2>/dev/null || true
